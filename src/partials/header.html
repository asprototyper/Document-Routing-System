<header class="hdr">
  <div class="hdr-left">
    <button class="sb-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="hdr-logo">
      <img id="{{logoId}}" class="topbarlogo" src="img/{{logoSrc}}" alt="⬡">
      <p class="ntc">NTC</p> Document <em>Tracker</em>
    </span>
    <span class="hdr-tag">Office</span>
  </div>
  <nav class="hdr-nav">
    <button class="nav-pill" onclick="goTo('tracker')">Tracker</button>
    <button class="nav-pill" onclick="goTo('documents')">Documents</button>
    <button class="nav-pill" onclick="goTo('metrics')">Metrics</button>
  </nav>
  <div class="hdr-right">
    <div class="theme-switcher">
      <button class="theme-btn" data-theme="light" onclick="applyTheme('light')">Light</button>
      <button class="theme-btn" data-theme="dark"  onclick="applyTheme('dark')">Dark</button>
      <button class="theme-btn" data-theme="slate" onclick="applyTheme('slate')">Slate</button>
      <button class="theme-btn" data-theme="warm"  onclick="applyTheme('warm')">Warm</button>
    </div>
    <button class="btn btn-ghost btn-sm icon-btn" onclick="openSettings()" aria-label="Settings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <button class="btn btn-ghost btn-sm" onclick="doLock()">Lock</button>
    <button class="btn btn-primary btn-sm" onclick="openCreate()">
      <span class="btn-new-label">+ New Document</span>
      <span class="btn-new-icon">+</span>
    </button>
  </div>
</header>
