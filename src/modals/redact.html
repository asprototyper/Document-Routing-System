<div class="overlay" id="ov-redact">
  <div class="modal">
    <div class="m-hd">
      <div>
        <h2 style="color:var(--red)">⚠ Redact Stage</h2>
        <p>This will remove the timestamp and reset the stage to unstamped</p>
      </div>
      <button class="m-close" onclick="closeOv('ov-redact')">✕</button>
    </div>
    <div class="m-body">
      <div class="stmp-info" style="border-color:rgba(192,57,43,.3);background:rgba(192,57,43,.04)">
        <strong id="redact-name" style="color:var(--red)"></strong>
        <span id="redact-hint"></span>
      </div>
      <div style="font-size:12px;color:var(--muted);line-height:1.7;padding:10px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:4px">
        Are you sure? This action <strong style="color:var(--red)">cannot be undone</strong>.
        The timestamp will be permanently removed.
      </div>
    </div>
    <div class="m-ft">
      <span class="m-ft-note">This action is irreversible.</span>
      <div class="m-ft-btns">
        <button class="btn btn-ghost" onclick="closeOv('ov-redact')">Cancel — Keep Timestamp</button>
        <button class="btn" style="background:var(--red);border-color:var(--red);color:#fff" onclick="doRedact()">Yes, Redact This Stage</button>
      </div>
    </div>
  </div>
</div>
